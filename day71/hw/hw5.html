<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>ფრინველები</title>
    
    <link rel="stylesheet" href="hw5.css">
</head>
<body>
    <h2>ფრინველების სახეობები</h2>
    <table>
        <tr>
            <th>სახეობა</th>
            <th>გარეგნობა</th>
            <th>თავისებურება</th>
        </tr>
        <tr>
            <td>თუთიყუში</td>
            <td>ფერადი, საშუალო ზომის</td>
            <td>აკოპირებს ადამიანის ხმას</td>
        </tr>
        <tr>
            <td>კაკაბი</td>
            <td>დიდი, ჭკვიანი</td>
            <td>ძლიერი ბუმბული, ხმის იმიტაცია</td>
        </tr>
        <tr>
            <td>ბეღურა</td>
            <td>ღრმა ყავისფერი, ღამით ნადირობს</td>
            <td>შეგრძნობის სენსორული უპირატესობა ღამით</td>
        </tr>
    </table>
</body>
</html>
