<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>რეგისტრაციის ფორმები - მხოლოდ input</title>
    <link rel="stylesheet" href="registracia1.css">
</head>
<body>


<form name="register1">
    <h2>მომხმარებლის რეგისტრაცია</h2>
    
    <input type="text" placeholder="სახელი">
     <br><br>
    <input type="email" placeholder="ელფოსტა">
     <br><br>
    <input type="password" placeholder="პაროლი">
     <br><br>
    <input type="submit" value="დარეგისტრირება">
</form>

<form name="register2">
    <h2>სწრაფი რეგისტრაცია</h2>
    
    <input type="text" placeholder="მომხმარებელი">
     <br><br>
    <input type="tel" placeholder="ტელეფონი">
     <br><br>
    <input type="submit" value="გაგზავნა">
</form>


<form name="register3">
    <h2>გაფართოებული ფორმა</h2>
    
    <input type="text" placeholder="სახელი">
    <br><br>
    <input type="email" placeholder="ელფოსტა">
    <br><br>
    <input type="password" placeholder="პაროლი">
    <br><br>
    <input type="text" placeholder="საინტერესო ინფორმაცია">
     <br><br>
    <input type="submit" value="დადასტურება">
</form>

</body>
</html>
